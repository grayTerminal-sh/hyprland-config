# Battery
label {
    monitor =
    text = cmd[update:1000] ~/.local/bin/battery.sh 
    color = rgba(169, 177, 214, 1.0)
    font_size = 24
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = -20, -510
    halign = right
    valign = center
    zindex = 5
}

# Battery div
shape {
    monitor =
    size = 150, 35
    color = rgba(41, 46, 66, 0.9)
    rounding = 10
    rotate = 0
    position = 905, 12
    halign = center
    valign = bottom
    zindex = 1
}
