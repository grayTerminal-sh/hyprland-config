######################################
##                                  ##
##            Hypr Maps             ##
##                                  ##
######################################

# --- Variables ---
$mainMod = SUPER

# Launch apps
bind = $mainMod, Return, exec, kitty
bind = $mainMod, P, exec, perplexity
bind = $mainMod, B, exec, firefox 
bind = $mainMod, E, exec, nautilus
bind = $mainMod, M, exec, deezer-desktop
bind = $mainMod, D, exec, discord
bind = $mainMod, W, exec, waypaper
bind = $mainMod, C, exec, hyprpicker -n -a --radius=60
bind = $mainMod, G, exec, google-chrome-stable
bind = $mainMod, T, exec, ~/.local/bin/switch.sh
# Windows
bind = $mainMod, Q, killactive
bind = $mainMod, F, fullscreen, 1

# Workspaces
bind = $mainMod, ampersand, workspace, 1
bind = $mainMod, eacute, workspace, 2
bind = $mainMod, quotedbl, workspace, 3
bind = $mainMod, apostrophe, workspace, 4
bind = $mainMod, parenleft, workspace, 5
bind = $mainMod, minus, workspace, 6
bind = $mainMod, egrave, workspace, 7
bind = $mainMod, underscore, workspace, 8
bind = $mainMod, ccedilla, workspace, 9
bind = $mainMod, agrave, workspace, 10

bind = $mainMod SHIFT, ampersand, movetoworkspace, 1
bind = $mainMod SHIFT, eacute, movetoworkspace, 2
bind = $mainMod SHIFT, quotedbl, movetoworkspace, 3
bind = $mainMod SHIFT, apostrophe, movetoworkspace, 4
bind = $mainMod SHIFT, parenleft, movetoworkspace, 5
bind = $mainMod SHIFT, minus, movetoworkspace, 6
bind = $mainMod SHIFT, egrave, movetoworkspace, 7
bind = $mainMod SHIFT, underscore, movetoworkspace, 8
bind = $mainMod SHIFT, ccedilla, movetoworkspace, 9
bind = $mainMod SHIFT, agrave, movetoworkspace, 10

#
### Bind Maison
#

# Lock / logout
bind = $mainMod, L, exec, hyprlock
bind = $mainMod SHIFT, E, exec, hyprctl dispatch exit

### Screenshots
# Capture d'une zone -> presse-papiers
bind = , PRINT, exec, grim -g "$(slurp)" - | wl-copy
# Capture de tout l'écran -> fichier dans ~/Pictures
bind = SUPER, PRINT, exec, grim ~/Images/screenshot-$(date +'%Y%m%d-%H%M%S').png
# Capture de la fenêtre active -> presse-papiers
bind = SUPER SHIFT, PRINT, exec, grim -g "$(hyprctl activewindow -j | jq -r '.at[0] | tostring + \",\" + (.at[1] | tostring) + \" \" + (.size[0] | tostring) + \"x\tostring" + (.size[1] | tostring)')" - | wl-copy

bind = SHIFT CTRL, W, exec, ~/.local/bin/waybar.sh
bind = SUPER, SPACE, exec, ~/.local/bin/waybar-autohide-dock.sh

# Scratchpad
# lancer le terminal dans un workspace spécial
bind = , F10, exec, kitty --class kitty-dropterm
# toggle du scratchpad
bind = , F12, togglespecialworkspace

# Presse-papier
bind = $mainMod, V, exec, ~/.local/bin/cliphist-wofi-img

# Volume (PipeWire)
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.2 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Luminosité (brightnessctl)
binde = , XF86MonBrightnessUp,   exec, brightnessctl s +10%
binde = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Move focus
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Resize windows
binde = $mainMod SHIFT, left, resizeactive,-50 0
binde = $mainMod SHIFT, right, resizeactive,50 0
binde = $mainMod SHIFT, up, resizeactive,0 -50
binde = $mainMod SHIFT, down, resizeactive,0 50

# Move windows
bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d
bindm = $mainMod, mouse:272, movewindow

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
