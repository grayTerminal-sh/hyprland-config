######################################
##                                  ##
##         Hypr Animations          ##
##                                  ##
######################################

animations {
    enabled = yes

    bezier = wind, 0.05, 0.9, 0.1, 1.0

    animation = windows,     1, 3, wind, slide
    animation = windowsIn,   1, 3, wind, slide
    animation = windowsOut,  1, 3, wind, slide
    animation = windowsMove, 1, 2, wind, slide

    animation = fade, 1, 3, default
    animation = workspaces, 1, 3, wind
}

